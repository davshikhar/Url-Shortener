<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep:       #0a0a12;
            --bg-card:       rgba(255,255,255,0.045);
            --bg-card-hover: rgba(255,255,255,0.07);
            --border:        rgba(255,255,255,0.10);
            --border-focus:  rgba(139,92,246,0.7);
            --accent-1:      #8b5cf6;
            --accent-2:      #6366f1;
            --accent-glow:   rgba(139,92,246,0.35);
            --green:         #10b981;
            --green-glow:    rgba(16,185,129,0.3);
            --text-primary:  #f1f0f5;
            --text-secondary:#9990b8;
            --text-muted:    #5a5370;
            --error:         #f87171;
            --radius-lg:     18px;
            --radius-md:     12px;
            --radius-sm:     8px;
        }

        *, *::before, *::after {
            margin: 0; padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-deep);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            overflow-x: hidden;
            position: relative;
        }

        /* ── Ambient background orbs ── */
        body::before, body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            pointer-events: none;
            z-index: 0;
        }
        body::before {
            width: 520px; height: 520px;
            background: radial-gradient(circle, rgba(99,102,241,0.18) 0%, transparent 70%);
            top: -120px; left: -100px;
            animation: drift1 14s ease-in-out infinite alternate;
        }
        body::after {
            width: 420px; height: 420px;
            background: radial-gradient(circle, rgba(139,92,246,0.14) 0%, transparent 70%);
            bottom: -80px; right: -80px;
            animation: drift2 18s ease-in-out infinite alternate;
        }

        @keyframes drift1 {
            from { transform: translate(0,0) scale(1); }
            to   { transform: translate(60px,40px) scale(1.12); }
        }
        @keyframes drift2 {
            from { transform: translate(0,0) scale(1); }
            to   { transform: translate(-50px,-30px) scale(1.1); }
        }

        /* ── Card ── */
        .card {
            position: relative;
            z-index: 1;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 48px 44px;
            width: 100%;
            max-width: 560px;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow:
                    0 0 0 1px rgba(255,255,255,0.04) inset,
                    0 32px 80px rgba(0,0,0,0.5),
                    0 0 60px rgba(99,102,241,0.06);
            animation: cardIn 0.6s cubic-bezier(0.22,1,0.36,1) both;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(28px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ── Header ── */
        .header {
            text-align: center;
            margin-bottom: 36px;
        }

        .logo-wrap {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 60px; height: 60px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--accent-2), var(--accent-1));
            box-shadow: 0 8px 24px var(--accent-glow);
            font-size: 1.7rem;
            margin-bottom: 18px;
            animation: iconPop 0.5s 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
        }

        @keyframes iconPop {
            from { transform: scale(0.5) rotate(-15deg); opacity: 0; }
            to   { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            color: var(--text-primary);
            letter-spacing: -0.03em;
            line-height: 1.1;
        }

        h1 span {
            background: linear-gradient(90deg, var(--accent-1), #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            margin-top: 8px;
            color: var(--text-secondary);
            font-size: 0.92rem;
            font-weight: 300;
            letter-spacing: 0.01em;
        }

        /* ── Divider ── */
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border), transparent);
            margin: 0 -44px 32px;
        }

        /* ── Form ── */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.78rem;
            font-weight: 500;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 8px;
        }

        .input-wrap {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1rem;
            pointer-events: none;
            transition: color 0.2s;
        }

        input[type="url"] {
            width: 100%;
            padding: 14px 16px 14px 44px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            color: var(--text-primary);
            transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
            outline: none;
        }

        input[type="url"]::placeholder { color: var(--text-muted); }

        input[type="url"]:focus {
            border-color: var(--border-focus);
            background: rgba(139,92,246,0.06);
            box-shadow: 0 0 0 3px rgba(139,92,246,0.12);
        }

        input[type="url"]:focus + .input-icon,
        .input-wrap:focus-within .input-icon {
            color: var(--accent-1);
        }

        .error {
            color: var(--error);
            font-size: 0.8rem;
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .error::before { content: '⚠'; font-size: 0.75rem; }

        /* ── Submit Button ── */
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent-2) 0%, var(--accent-1) 100%);
            color: #fff;
            border: none;
            border-radius: var(--radius-md);
            font-family: 'Syne', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 20px var(--accent-glow);
        }

        .btn-submit::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.18), transparent);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 28px var(--accent-glow); }
        .btn-submit:hover::before { opacity: 1; }
        .btn-submit:active { transform: translateY(0); }

        /* ── Result Section ── */
        .result-section {
            margin-top: 28px;
            padding: 24px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            display: none;
        }

        .result-section.show {
            display: block;
            animation: slideUp 0.35s cubic-bezier(0.22,1,0.36,1) both;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .result-title {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: 'Syne', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: var(--green);
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .result-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px; height: 24px;
            background: rgba(16,185,129,0.15);
            border-radius: 50%;
            font-size: 0.75rem;
        }

        .result-item {
            margin-bottom: 14px;
        }

        .result-label {
            font-size: 0.72rem;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 6px;
        }

        .result-value {
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            color: var(--text-secondary);
            word-break: break-all;
            line-height: 1.5;
        }

        .short-url-value {
            background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(139,92,246,0.2));
            border-color: rgba(139,92,246,0.35);
            color: #c4b5fd;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
        }

        .short-url-value:hover {
            background: linear-gradient(135deg, rgba(99,102,241,0.3), rgba(139,92,246,0.3));
            transform: scale(1.01);
            box-shadow: 0 4px 16px rgba(139,92,246,0.2);
        }

        /* ── Action Buttons ── */
        .btn-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 16px;
        }

        .btn-copy, .btn-reset {
            padding: 11px 16px;
            border-radius: var(--radius-md);
            font-family: 'Syne', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: transform 0.15s, box-shadow 0.2s, background 0.2s;
            letter-spacing: 0.01em;
        }

        .btn-copy {
            background: linear-gradient(135deg, rgba(16,185,129,0.2), rgba(16,185,129,0.12));
            border: 1px solid rgba(16,185,129,0.3);
            color: #34d399;
        }

        .btn-copy:hover {
            background: linear-gradient(135deg, rgba(16,185,129,0.3), rgba(16,185,129,0.2));
            box-shadow: 0 4px 16px var(--green-glow);
            transform: translateY(-1px);
        }

        .btn-reset {
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            color: var(--text-secondary);
        }

        .btn-reset:hover {
            background: rgba(255,255,255,0.08);
            transform: translateY(-1px);
        }

        /* ── Copy toast ── */
        .copy-toast {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(16,185,129,0.15);
            border: 1px solid rgba(16,185,129,0.35);
            color: #34d399;
            padding: 10px 20px;
            border-radius: 99px;
            font-size: 0.85rem;
            font-weight: 500;
            backdrop-filter: blur(12px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s, transform 0.25s;
            z-index: 100;
            white-space: nowrap;
        }

        .copy-toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <div class="logo-wrap">🔗</div>
        <h1>URL <span>Shortener</span></h1>
        <p class="subtitle">Transform long links into clean, shareable URLs</p>
    </div>

    <div class="divider"></div>

    <form th:action="@{/shorten}" method="post" th:object="${request}" id="shortenForm">
        <div class="form-group">
            <label for="url">Destination URL</label>
            <div class="input-wrap">
                <input
                        type="url"
                        id="url"
                        name="url"
                        th:field="*{url}"
                        placeholder="https://example.com/your/long/url"
                        required>
                <span class="input-icon">⬡</span>
            </div>
            <div th:if="${#fields.hasErrors('url')}" class="error" th:errors="*{url}"></div>
        </div>

        <button type="submit" class="btn-submit">✦ Shorten URL</button>
    </form>

    <!-- Result Section -->
    <div class="result-section" id="resultSection" th:if="${response != null}">
        <div class="result-title">
            <span class="result-badge">✓</span>
            Link created successfully
        </div>

        <div class="result-item">
            <div class="result-label">Short URL</div>
            <div class="result-value short-url-value" id="shortUrl"
                 th:text="${response.shortUrl}"
                 onclick="copyToClipboard()"
                 title="Click to copy"></div>
        </div>

        <div class="result-item">
            <div class="result-label">Original URL</div>
            <div class="result-value" th:text="${response.originalUrl}"></div>
        </div>

        <div class="result-item">
            <div class="result-label">Short Code</div>
            <div class="result-value" th:text="${response.shortCode}"></div>
        </div>

        <div class="btn-row">
            <button type="button" class="btn-copy" onclick="copyToClipboard()">⎘ Copy Link</button>
            <button type="button" class="btn-reset" onclick="resetForm()">↺ New URL</button>
        </div>
    </div>
</div>

<!-- Toast notification -->
<div class="copy-toast" id="copyToast">✓ Copied to clipboard</div>

<script>
    const resultSection = document.getElementById('resultSection');
    if (resultSection && resultSection.textContent.trim()) {
        resultSection.classList.add('show');
    }

    function copyToClipboard() {
        const shortUrl = document.getElementById('shortUrl').textContent.trim();
        navigator.clipboard.writeText(shortUrl).then(function () {
            const toast = document.getElementById('copyToast');
            toast.classList.add('show');
            setTimeout(function () {
                toast.classList.remove('show');
            }, 2200);
        }).catch(function (err) {
            console.error('Failed to copy:', err);
        });
    }

    function resetForm() {
        document.getElementById('shortenForm').reset();
        const rs = document.getElementById('resultSection');
        if (rs) rs.classList.remove('show');
        document.getElementById('url').focus();
    }
</script>
</body>
